# The GroupName here is used to identify your company or business unit that
# created this webhook.  For example, "acme.mycompany.com".
#
# This name will need to be referenced in each Issuer's `webhook` stanza to
# inform cert-manager of where to send ChallengePayload resources in order to
# solve the DNS01 challenge.
#
# This group name should be UNIQUE.  Using your own company's domain is
# recommended.
groupName: acme.mycompany.com

replicaCount: 1

certManager:
  namespace: cert-manager
  serviceAccountName: cert-manager

# Name of the Kubernetes Secret that holds the Infoblox credentials.
# The chart will create a Role and RoleBinding so the webhook's ServiceAccount
# can read this Secret.  Override if your secret has a different name.
credentialsSecret:
  name: infoblox-credentials

# Certificate durations
rootCACertificate:
  duration: "43800h"   # 5 years

servingCertificate:
  duration: "8760h"    # 1 year

image:
  repository: tazthemaniac/cert-manager-webhook-infoblox
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""
  pullPolicy: IfNotPresent

# Optional image pull secrets for private registries.
imagePullSecrets: []
# - name: my-registry-secret

nameOverride: ""
fullnameOverride: ""

# Optional annotations added to every pod.
podAnnotations: {}

service:
  type: ClusterIP
  port: 443
  annotations: {}

# Resource requests / limits for the webhook container.
resources: {}
# limits:
#   cpu: 100m
#   memory: 128Mi
# requests:
#   cpu: 50m
#   memory: 64Mi

nodeSelector: {}

tolerations: []

affinity: {}

# Topology spread constraints (useful for multi-zone clusters).
topologySpreadConstraints: []

# Pod Disruption Budget – enable for production deployments.
podDisruptionBudget:
  enabled: false
  # minAvailable: 1
