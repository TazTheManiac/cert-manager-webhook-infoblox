name: Docker

on:
  push:
    branches:
      - master
    paths:
      - 'Dockerfile'
      - 'go.mod'
      - 'go.sum'
      - '**.go'
      - '!**_test.go'

jobs:
  docker:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Log in to Docker Hub
        uses: docker/login-action@v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Get image tag from Chart.yaml
        id: chart
        run: |
          echo "tag=$(grep '^appVersion:' charts/cert-manager-webhook-infoblox/Chart.yaml | awk '{print $2}' | tr -d '"')" >> "$GITHUB_OUTPUT"

      - name: Build image
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          push: false
          load: true
          tags: |
            tazthemaniac/cert-manager-webhook-infoblox:${{ steps.chart.outputs.tag }}
            tazthemaniac/cert-manager-webhook-infoblox:latest

      - name: Push image
        run: |
          docker push tazthemaniac/cert-manager-webhook-infoblox:${{ steps.chart.outputs.tag }}
          docker push tazthemaniac/cert-manager-webhook-infoblox:latest
