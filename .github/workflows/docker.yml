name: Docker

on:
  push:
    branches:
      - master

jobs:
  docker:
    name: Build, scan, and push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Log in to Docker Hub
        uses: docker/login-action@v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Get image tag from Chart.yaml
        id: chart
        run: |
          echo "tag=$(grep '^appVersion:' charts/cert-manager-webhook-infoblox/Chart.yaml | awk '{print $2}' | tr -d '"')" >> "$GITHUB_OUTPUT"

      - name: Build image
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          push: false
          load: true
          tags: |
            tazthemaniac/cert-manager-webhook-infoblox:${{ steps.chart.outputs.tag }}
            tazthemaniac/cert-manager-webhook-infoblox:latest

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.32.0
        with:
          image-ref: tazthemaniac/cert-manager-webhook-infoblox:${{ steps.chart.outputs.tag }}
          format: sarif
          output: trivy-results.sarif

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: Push image
        run: |
          docker push tazthemaniac/cert-manager-webhook-infoblox:${{ steps.chart.outputs.tag }}
          docker push tazthemaniac/cert-manager-webhook-infoblox:latest
