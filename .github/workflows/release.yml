name: Release

on:
  push:
    branches:
      - master

jobs:
  docker:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Log in to Docker Hub
        uses: docker/login-action@v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Get image tag from Chart.yaml
        id: chart
        run: |
          echo "tag=$(grep '^appVersion:' charts/cert-manager-webhook-infoblox/Chart.yaml | awk '{print $2}' | tr -d '"')" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          push: true
          tags: |
            tazthemaniac/cert-manager-webhook-infoblox:${{ steps.chart.outputs.tag }}
            tazthemaniac/cert-manager-webhook-infoblox:latest

  helm:
    name: Release Helm chart
    runs-on: ubuntu-latest
    needs: docker
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Set up Helm
        uses: azure/setup-helm@v5.0.0

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.7.0
        env:
          CR_TOKEN: ${{ secrets.HELM_RELEASE_TOKEN }}
